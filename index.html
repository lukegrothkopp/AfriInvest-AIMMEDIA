
<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans, sans-serif); font-size: 15px; color: var(--color-text-primary); background: transparent; padding: 0 0 2rem; }
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
.header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; padding-top: 1rem; flex-wrap: wrap; gap: 8px; }
.header h2 { font-size: 18px; font-weight: 500; }
.header-sub { font-size: 13px; color: var(--color-text-secondary); margin-top: 3px; }
.saved { font-size: 11px; color: var(--color-text-tertiary); }
.metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
.metric-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.metric-value { font-size: 22px; font-weight: 500; }
.green { color: var(--color-text-success); }
.amber { color: var(--color-text-warning); }
.red { color: var(--color-text-danger); }
.tab-bar { display: flex; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 1.5rem; }
.tab { padding: 8px 16px; font-size: 14px; cursor: pointer; color: var(--color-text-secondary); border: none; border-bottom: 2px solid transparent; background: none; font-family: inherit; }
.tab.active { color: var(--color-text-primary); border-bottom-color: var(--color-text-primary); font-weight: 500; }
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
.b-done { background: var(--color-background-success); color: var(--color-text-success); }
.b-partial { background: var(--color-background-warning); color: var(--color-text-warning); }
.b-pending { background: var(--color-background-secondary); color: var(--color-text-secondary); }
.b-blocked { background: var(--color-background-danger); color: var(--color-text-danger); }
.b-info { background: var(--color-background-info); color: var(--color-text-info); }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); margin-bottom: 10px; overflow: hidden; }
.card-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; }
.section-label { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-secondary); }
.expand { font-size: 13px; color: var(--color-text-tertiary); margin-left: auto; transition: transform 0.2s; }
.expand.open { transform: rotate(180deg); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--color-text-secondary); padding: 8px 14px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
td { padding: 9px 14px; border-bottom: 0.5px solid var(--color-border-tertiary); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
.prog-bar { height: 5px; background: var(--color-background-secondary); border-radius: 99px; overflow: hidden; min-width: 60px; }
.prog-fill { height: 100%; border-radius: 99px; background: var(--color-text-success); }
.prog-fill.partial { background: var(--color-text-warning); }
.note-cell { font-size: 12px; color: var(--color-text-secondary); max-width: 160px; }
.payment-block { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 16px; margin-bottom: 10px; background: var(--color-background-primary); }
.pay-top { display: flex; justify-content: space-between; align-items: flex-start; }
.pay-name { font-weight: 500; font-size: 15px; }
.pay-amount { font-size: 20px; font-weight: 500; }
.pay-cond { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }
.pay-footer { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
select.pay-sel { font-size: 12px; padding: 4px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); cursor: pointer; font-family: inherit; }
.btn { font-size: 13px; padding: 5px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; font-family: inherit; }
.btn:hover { background: var(--color-background-secondary); }
.log-row { padding: 7px 0; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 13px; color: var(--color-text-secondary); }
.log-row:last-child { border-bottom: none; }
.log-time { font-size: 11px; color: var(--color-text-tertiary); display: block; }
.empty { text-align: center; padding: 20px; font-size: 14px; color: var(--color-text-tertiary); }
.inline-note { font-size: 12px; padding: 3px 6px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); font-family: inherit; width: 100%; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.dot-done { background: var(--color-text-success); }
.dot-partial { background: var(--color-text-warning); }
.dot-pending { background: var(--color-border-secondary); }
.dot-blocked { background: var(--color-text-danger); }
</style>
</head>
<body>
<h2 class="sr-only">AIMMEDIA Zambia Campaign Tracker — deliverables and payment dashboard</h2>

<div class="header">
  <div>
    <h2>AIMMEDIA × AFRI-INVEST tracker</h2>
    <div class="header-sub">Zambia Presidential Campaign · Contract value: USD 27,250</div>
  </div>
  <div id="saved" class="saved"></div>
</div>

<div id="metrics" class="metric-grid"></div>

<div class="tab-bar">
  <button class="tab active" onclick="showTab('m1', this)">Month 1 deliverables</button>
  <button class="tab" onclick="showTab('mou', this)">MOU milestones</button>
  <button class="tab" onclick="showTab('pay', this)">Payments</button>
  <button class="tab" onclick="showTab('log', this)">Activity log</button>
</div>

<div id="tab-m1"></div>
<div id="tab-mou" style="display:none"></div>
<div id="tab-pay" style="display:none"></div>
<div id="tab-log" style="display:none"></div>

<script>
const SK = 'aimmedia_v3';

const M1 = [
  { id:'r1', cat:'Audio / Radio', item:'Master Radio Ad (60 sec)', qty:1, submitted:1, aiStatus:'Done', note:'Script done as main TVC' },
  { id:'r2', cat:'Audio / Radio', item:'Support Radio Ads (45 sec)', qty:3, submitted:5, aiStatus:'In progress', note:'5 completed, 2 carried to Month 2 (local translations)' },
  { id:'r3', cat:'Audio / Radio', item:'WhatsApp Audio Assets', qty:3, submitted:0, aiStatus:'Pending', note:'' },
  { id:'r4', cat:'Audio / Radio', item:'Presenter Mentions / Live Reads', qty:10, submitted:5, aiStatus:'Partial', note:'5 pending approval' },
  { id:'r5', cat:'Audio / Radio', item:'Hour Check / Bally Checks', qty:9, submitted:9, aiStatus:'Done', note:'Scripts done, 9 pending approval' },
  { id:'v1', cat:'Video / TV', item:'Master TVC / Film (60 sec)', qty:1, submitted:1, aiStatus:'Done', note:'Script done' },
  { id:'v2', cat:'Video / TV', item:'Human Interest TVCs / Testimonial Films', qty:3, submitted:0, aiStatus:'Pending', note:'' },
  { id:'v3', cat:'Video / TV', item:'Digital Cutdowns (15–30 sec)', qty:15, submitted:0, aiStatus:'Pending', note:'' },
  { id:'v4', cat:'Video / TV', item:'Citizen Testimonial Clips at Rally', qty:6, submitted:0, aiStatus:'Pending', note:'Pending rally schedule' },
  { id:'v5', cat:'Video / TV', item:'Rally / Activation AV Assets', qty:2, submitted:0, aiStatus:'Pending', note:'Pending rally schedule' },
  { id:'g1', cat:'Graphics / Digital', item:'Quote Cards / Graphics', qty:15, submitted:0, aiStatus:'Pending', note:'' },
  { id:'g2', cat:'Graphics / Digital', item:'Social Statics / Carousels', qty:15, submitted:0, aiStatus:'Pending', note:'' },
  { id:'b1', cat:'Branding', item:'Campaign Mnemonic & Audio Branding', qty:1, submitted:0, aiStatus:'Pending', note:'Zambian team dependency' },
];

const MOU_SECTIONS = [
  { id:'ms1', label:'Core team strategic deliverables', items:[
    { id:'ms1a', label:'Campaign strategy framework' },
    { id:'ms1b', label:'Communications strategy' },
    { id:'ms1c', label:'Creative concepts & campaign themes' },
    { id:'ms1d', label:'Messaging framework & key talking points' },
    { id:'ms1e', label:'Stakeholder engagement support' },
    { id:'ms1f', label:'Coordination with HH Campaign Team' },
    { id:'ms1g', label:'Quality control of all outputs' },
    { id:'ms1h', label:'Campaign performance monitoring' },
  ]},
  { id:'ms2', label:'Media & project management', items:[
    { id:'ms2a', label:'Media planning & buying recommendations' },
    { id:'ms2b', label:'Campaign implementation updates' },
    { id:'ms2c', label:'Strategic recommendations' },
    { id:'ms2d', label:'Phase 1 progress report (payment trigger)' },
    { id:'ms2e', label:'Final project report (payment trigger)' },
  ]},
];

const PAYS = [
  { id:'p1', label:'First payment — 25%', amount:6813, cond:'Due upon MOU signing & valid invoice', trigger:'MOU signed' },
  { id:'p2', label:'Second payment — 50%', amount:13625, cond:'Phase 1 complete + progress report submitted', trigger:'Phase 1 + report' },
  { id:'p3', label:'Final payment — 25%', amount:6812, cond:'All deliverables complete + final report submitted', trigger:'All done' },
];

let ST = { m1notes:{}, m1verified:{}, mouChecks:{}, mouNotes:{}, payStatus:{}, log:[], openSections:{} };

const cats = [...new Set(M1.map(d=>d.cat))];

async function load() {
  try { const r = await window.storage.get(SK); if(r?.value) ST = {...ST,...JSON.parse(r.value)}; } catch(e){}
  render();
}
async function save() {
  try { await window.storage.set(SK, JSON.stringify(ST)); document.getElementById('saved').textContent = 'Saved '+new Date().toLocaleTimeString(); } catch(e){}
}
function log(msg) { ST.log.unshift({msg, t:new Date().toLocaleString()}); if(ST.log.length>60) ST.log=ST.log.slice(0,60); }

function aiStatusBadge(s, sub, qty) {
  if(s==='Done'||sub>=qty) return '<span class="badge b-done">Done</span>';
  if(s==='In progress'||s==='Partial'||(sub>0&&sub<qty)) return '<span class="badge b-partial">Partial</span>';
  if(s==='Pending'&&sub===0) return '<span class="badge b-pending">Pending</span>';
  return '<span class="badge b-pending">'+s+'</span>';
}

function verBadge(id) {
  const v = ST.m1verified[id]||'unverified';
  if(v==='verified') return '<span class="badge b-done">Verified ✓</span>';
  if(v==='disputed') return '<span class="badge b-blocked">Disputed</span>';
  return '<span class="badge b-pending">Unverified</span>';
}

function mouBadge(id) {
  return ST.mouChecks[id] ? '<span class="badge b-done">Done</span>' : '<span class="badge b-pending">Pending</span>';
}

function payBadge(id) {
  const s = ST.payStatus[id]||'pending';
  if(s==='paid') return '<span class="badge b-done">Paid</span>';
  if(s==='invoiced') return '<span class="badge b-partial">Invoiced</span>';
  if(s==='overdue') return '<span class="badge b-blocked">Overdue</span>';
  return '<span class="badge b-pending">Pending</span>';
}

function metrics() {
  const m1done = M1.filter(d=>d.submitted>=d.qty||d.aiStatus==='Done').length;
  const m1total = M1.length;
  const m1unitsDone = M1.reduce((a,d)=>a+Math.min(d.submitted,d.qty),0);
  const m1unitsTotal = M1.reduce((a,d)=>a+d.qty,0);
  const verified = M1.filter(d=>ST.m1verified[d.id]==='verified').length;
  const paid = PAYS.filter(p=>ST.payStatus[p.id]==='paid').reduce((a,p)=>a+p.amount,0);
  const pct = Math.round(m1unitsDone/m1unitsTotal*100);
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">M1 line items</div><div class="metric-value ${m1done===m1total?'green':m1done>4?'amber':'red'}">${m1done}/${m1total}</div></div>
    <div class="metric"><div class="metric-label">Units delivered</div><div class="metric-value ${pct>80?'green':pct>40?'amber':'red'}">${m1unitsDone}/${m1unitsTotal}</div></div>
    <div class="metric"><div class="metric-label">AFRI-invest verified</div><div class="metric-value ${verified>5?'green':verified>2?'amber':'red'}">${verified}/${m1total}</div></div>
    <div class="metric"><div class="metric-label">Paid to date</div><div class="metric-value green">$${paid.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">Outstanding</div><div class="metric-value amber">$${(27250-paid).toLocaleString()}</div></div>
  `;
}

function renderM1() {
  let html='';
  for(const cat of cats) {
    const items = M1.filter(d=>d.cat===cat);
    const open = ST.openSections['m1_'+cat]!==false;
    html+=`<div class="card"><div class="card-header" onclick="toggleSec('m1_${cat.replace(/\//g,'_').replace(/ /g,'_')}')">
      <span class="section-label">${cat}</span>
      <span class="badge b-info" style="margin-left:auto;margin-right:8px">${items.filter(d=>d.submitted>=d.qty||d.aiStatus==='Done').length}/${items.length}</span>
      <span class="expand ${open?'open':''}"><i class="ti ti-chevron-down" aria-hidden="true"></i></span>
    </div>`;
    if(open){
      html+=`<table><thead><tr>
        <th style="width:30%">Deliverable</th>
        <th style="width:10%">Qty</th>
        <th style="width:12%">Submitted</th>
        <th style="width:11%">AIMMEDIA</th>
        <th style="width:12%">Verified by you</th>
        <th>Notes / remarks</th>
      </tr></thead><tbody>`;
      for(const d of items){
        const pct=d.qty>0?Math.min(100,Math.round(d.submitted/d.qty*100)):0;
        const ver=ST.m1verified[d.id]||'unverified';
        const note=ST.m1notes[d.id]||'';
        html+=`<tr>
          <td style="font-size:13px">${d.item}${d.note?`<div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px">${d.note}</div>`:''}</td>
          <td style="font-size:13px">${d.qty}</td>
          <td>
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:13px;font-weight:500">${d.submitted}</span>
              <div class="prog-bar"><div class="prog-fill ${pct<100?'partial':''}" style="width:${pct}%"></div></div>
            </div>
          </td>
          <td>${aiStatusBadge(d.aiStatus,d.submitted,d.qty)}</td>
          <td>
            <select style="font-size:11px;padding:3px 5px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer;font-family:inherit" onchange="setVer('${d.id}','${d.item.replace(/'/g,"\\'").replace(/\//g,'_')}',this.value)">
              <option value="unverified" ${ver==='unverified'?'selected':''}>Unverified</option>
              <option value="verified" ${ver==='verified'?'selected':''}>Verified ✓</option>
              <option value="disputed" ${ver==='disputed'?'selected':''}>Disputed</option>
            </select>
          </td>
          <td><input class="inline-note" type="text" placeholder="Add note…" value="${note}" onblur="setNote('${d.id}',this.value)"></td>
        </tr>`;
      }
      html+=`</tbody></table>`;
    }
    html+=`</div>`;
  }
  document.getElementById('tab-m1').innerHTML=html;
}

function renderMOU() {
  let html='';
  for(const sec of MOU_SECTIONS){
    const open=ST.openSections['mou_'+sec.id]!==false;
    const done=sec.items.filter(i=>ST.mouChecks[i.id]).length;
    html+=`<div class="card"><div class="card-header" onclick="toggleSec('mou_${sec.id}')">
      <span class="section-label">${sec.label}</span>
      <span class="badge b-info" style="margin-left:auto;margin-right:8px">${done}/${sec.items.length}</span>
      <span class="expand ${open?'open':''}"><i class="ti ti-chevron-down" aria-hidden="true"></i></span>
    </div>`;
    if(open){
      html+=`<div style="padding:4px 14px 10px">`;
      for(const item of sec.items){
        const checked=!!ST.mouChecks[item.id];
        const note=ST.mouNotes[item.id]||'';
        html+=`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary)">
          <input type="checkbox" id="mc_${item.id}" ${checked?'checked':''} onchange="toggleMOU('${item.id}','${item.label.replace(/'/g,"\\'")}')">
          <label for="mc_${item.id}" style="flex:1;font-size:14px;color:var(--color-text-primary);${checked?'text-decoration:line-through;color:var(--color-text-secondary)':''}">${item.label}</label>
          ${mouBadge(item.id)}
          <input class="inline-note" type="text" placeholder="Note…" value="${note}" onblur="setMOUNote('${item.id}',this.value)" style="max-width:180px">
        </div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  }
  document.getElementById('tab-mou').innerHTML=html;
}

function renderPay() {
  let cum=0;
  let html='<div style="padding-top:4px">';
  for(const p of PAYS){
    cum+=p.amount;
    const s=ST.payStatus[p.id]||'pending';
    html+=`<div class="payment-block">
      <div class="pay-top">
        <div><div class="pay-name">${p.label}</div><div class="pay-cond">${p.cond}</div></div>
        <div class="pay-amount">$${p.amount.toLocaleString()}</div>
      </div>
      <div class="pay-footer">
        ${payBadge(p.id)}
        <select class="pay-sel" onchange="setPay('${p.id}','${p.label.replace(/'/g,"\\'")}',this.value)">
          <option value="pending" ${s==='pending'?'selected':''}>Pending</option>
          <option value="invoiced" ${s==='invoiced'?'selected':''}>Invoiced</option>
          <option value="paid" ${s==='paid'?'selected':''}>Paid</option>
          <option value="overdue" ${s==='overdue'?'selected':''}>Overdue</option>
        </select>
        <span style="margin-left:auto;font-size:12px;color:var(--color-text-tertiary)">Cumulative: $${cum.toLocaleString()}</span>
      </div>
    </div>`;
  }
  html+=`<div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px;padding:8px 4px;border-top:0.5px solid var(--color-border-tertiary)">
    Bank: Exim Bank · USD Account 0320000601 · Payment due within 3 working days of valid invoice
  </div></div>`;
  document.getElementById('tab-pay').innerHTML=html;
}

function renderLog() {
  const el=document.getElementById('tab-log');
  if(!ST.log.length){ el.innerHTML='<div class="empty">No activity yet. Changes you make are logged here.</div>'; return; }
  let html='<div class="card"><div style="padding:6px 14px">';
  for(const e of ST.log) html+=`<div class="log-row">${e.msg}<span class="log-time">${e.t}</span></div>`;
  html+='</div></div>';
  el.innerHTML=html;
}

function render() { metrics(); renderM1(); renderMOU(); renderPay(); renderLog(); }

function showTab(tab, btn) {
  ['m1','mou','pay','log'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'':'none');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}

function toggleSec(id) {
  ST.openSections[id]=!(ST.openSections[id]!==false);
  renderM1(); renderMOU();
}

function setVer(id, label, val) {
  log('Verification updated: "'+label+'" → '+val);
  ST.m1verified[id]=val; save(); metrics(); renderLog();
  // re-render just verification dropdowns without full re-render to avoid losing focus
  renderM1();
}

function setNote(id, val) { ST.m1notes[id]=val; save(); }
function setMOUNote(id, val) { ST.mouNotes[id]=val; save(); }

function toggleMOU(id, label) {
  ST.mouChecks[id]=!ST.mouChecks[id];
  log((ST.mouChecks[id]?'✓ Completed: ':'○ Reopened: ')+label);
  save(); renderMOU(); renderLog(); metrics();
}

function setPay(id, label, val) {
  log('Payment status: "'+label+'" → '+val);
  ST.payStatus[id]=val; save(); renderPay(); renderLog(); metrics();
}

load();
</script>
</body>
</html>
